services:
    openmaint_app:
        image: mrhavens/cmdbuild:app-3.1.1
        depends_on:
            - openmaint_db
        restart: on-failure    
        volumes:
            - openmaint-tomcat:/usr/local/tomcat
        environment:
            # IMPORTANTE: Cambiamos a usuario 'postgres' para coincidir con la DB
            - POSTGRES_USER=cmdbuild
            - POSTGRES_PASS=cmdbuild
            - POSTGRES_PORT=5432
            - POSTGRES_HOST=openmaint_db
            - POSTGRES_DB=openmaint_3
            - OPENMAINT_DUMP=openmaint_empty.dump.xz
            - JAVA_OPTS=-Xmx3000m -Xms1500m
        deploy:
            resources:
                limits:
                    memory: 4000M
                reservations:
                    memory: 2000M
        
    openmaint_db:
        image: postgis/postgis:12-3.0-alpine
        volumes:
            - openmaint-db:/var/lib/postgresql/data
        environment:
            - POSTGRES_USER=cmdbuild
            - POSTGRES_PASSWORD=cmdbuild
            - POSTGRES_DB=openmaint_3
        restart: on-failure
        deploy:
            resources:
                limits:
                    memory: 1000M
                reservations:
                    memory: 300M

volumes:
    openmaint-db:
    openmaint-tomcat:
