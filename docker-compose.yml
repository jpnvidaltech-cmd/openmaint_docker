services:
    openmaint_app:
        image: mrhavens/cmdbuild:app-3.1.1
        depends_on:
            - openmaint_db_v2
        restart: on-failure    
        volumes:
            - openmaint-tomcat-v2:/usr/local/tomcat
        environment:
            - POSTGRES_USER=cmdbuild
            - POSTGRES_PASS=cmdbuild
            - POSTGRES_PORT=5432
            - POSTGRES_HOST=openmaint_db_v2
            - POSTGRES_DB=openmaint_3
            - OPENMAINT_DUMP=openmaint_empty.dump.xz
            - JAVA_OPTS=-Xmx3000m -Xms1500m -Dcmdbuild.config.db.username=cmdbuild -Dcmdbuild.config.db.password=cmdbuild
        deploy:
            resources:
                limits:
                    memory: 4000M
        
    openmaint_db_v2:
        image: postgis/postgis:12-3.0-alpine
        volumes:
            - db_data_v2:/var/lib/postgresql/data
        environment:
            - POSTGRES_USER=cmdbuild
            - POSTGRES_PASSWORD=cmdbuild
            - POSTGRES_DB=openmaint_3
        restart: on-failure
        deploy:
            resources:
                limits:
                    memory: 1000M

volumes:
    db_data_v2:
    openmaint-tomcat-v2:
